<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #00ff87; --text: #e8e8e8; --muted: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-left: 1.5rem; transition: color 0.2s; }
    nav a:hover { color: var(--accent); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); }

    .hero { padding: 5rem 2rem; max-width: 900px; margin: 0 auto; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 800; line-height: 1.1; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); margin: 1.5rem 0; max-width: 600px; line-height: 1.7; }
    .links { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 2rem; }
    .btn { padding: 0.6rem 1.4rem; border-radius: 4px; text-decoration: none; font-size: 0.85rem; font-weight: 500; border: 1px solid var(--border); color: var(--text); transition: all 0.2s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn.primary:hover { background: transparent; color: var(--accent); }

    section { padding: 4rem 2rem; max-width: 900px; margin: 0 auto; }
    h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .section-line { width: 40px; height: 3px; background: var(--accent); margin-bottom: 2.5rem; }

    .cert-grid, .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-family: 'Syne', sans-serif; font-size: 1rem; margin-bottom: 0.4rem; }
    .card .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.75rem; }
    .card p { font-size: 0.875rem; color: #aaa; line-height: 1.6; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .tag { background: #1e1e1e; border: 1px solid var(--border); padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.75rem; color: var(--muted); }
    .card-links { margin-top: 1rem; display: flex; gap: 0.75rem; }
    .card-links a { font-size: 0.8rem; color: var(--accent); text-decoration: none; }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.5rem; padding: 2rem; }
    .page-btn { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .page-btn:hover:not(.active) { border-color: var(--accent); }

    footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }
    .hidden { display: none; }
  </style>
</head>
<body>

<nav>
  <span class="logo" id="nav-name">Portfolio</span>
  <div>
    <a href="#about">About</a>
    <a href="#certifications">Certifications</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<div class="hero" id="about">
  <h1>Hi, I'm <span id="hero-name">—</span></h1>
  <h1 id="hero-title" style="color:var(--muted);font-size:clamp(1.5rem,3vw,2.5rem)"></h1>
  <p id="hero-bio"></p>
  <div class="links" id="hero-links"></div>
</div>

<section id="certifications">
  <h2>Certifications</h2>
  <div class="section-line"></div>
  <div class="cert-grid" id="cert-container"></div>
  <div class="pagination" id="cert-pagination"></div>
</section>

<section id="projects">
  <h2>Data Science Projects</h2>
  <div class="section-line"></div>
  <div class="proj-grid" id="proj-container"></div>
  <div class="pagination" id="proj-pagination"></div>
</section>

<footer id="footer"></footer>

<script>
const PER_PAGE = 6;
let certPage = 1, projPage = 1;

async function load(file) {
  const r = await fetch(file + '?v=' + Date.now());
  return r.json();
}

function paginate(items, page) {
  const start = (page - 1) * PER_PAGE;
  return items.slice(start, start + PER_PAGE);
}

function renderPagination(container, total, current, onPage) {
  const pages = Math.ceil(total / PER_PAGE);
  if (pages <= 1) { container.innerHTML = ''; return; }
  container.innerHTML = Array.from({length: pages}, (_, i) =>
    `<button class="page-btn ${i+1===current?'active':''}" onclick="${onPage}(${i+1})">${i+1}</button>`
  ).join('');
}

async function init() {
  const [profile, certs, projects] = await Promise.all([
    load('data/profile.json'),
    load('data/certifications.json'),
    load('data/projects.json')
  ]);

  // Profile
  document.title = profile.name + ' | Portfolio';
  document.getElementById('nav-name').textContent = profile.name.split(' ')[0];
  document.getElementById('hero-name').textContent = profile.name;
  document.getElementById('hero-title').textContent = profile.title;
  document.getElementById('hero-bio').textContent = profile.bio;
  document.getElementById('footer').textContent = `© ${new Date().getFullYear()} ${profile.name} · ${profile.email}`;

  const linksEl = document.getElementById('hero-links');
  const linkMap = { linkedin: 'LinkedIn', github: 'GitHub', website: 'Website', email: 'Email' };
  Object.entries(linkMap).forEach(([key, label]) => {
    if (!profile[key]) return;
    const a = document.createElement('a');
    a.className = 'btn' + (key === 'github' ? ' primary' : '');
    a.href = key === 'email' ? 'mailto:' + profile[key] : profile[key];
    a.target = '_blank'; a.textContent = label;
    linksEl.appendChild(a);
  });
  if (profile.phone) {
    const span = document.createElement('span');
    span.className = 'btn'; span.style.cursor = 'default';
    span.textContent = '📞 ' + profile.phone;
    linksEl.appendChild(span);
  }

  // Certs
  window.renderCerts = function(page) {
    certPage = page;
    const container = document.getElementById('cert-container');
    container.innerHTML = paginate(certs, page).map(c => `
      <div class="card">
        <h3>${c.title}</h3>
        <div class="meta">${c.issuer} · ${c.date}</div>
        ${c.url ? `<a class="btn" href="${c.url}" target="_blank" style="font-size:0.8rem;padding:0.4rem 0.9rem">View Certificate ↗</a>` : ''}
      </div>`).join('');
    renderPagination(document.getElementById('cert-pagination'), certs.length, page, 'renderCerts');
  };

  // Projects
  window.renderProjects = function(page) {
    projPage = page;
    const container = document.getElementById('proj-container');
    container.innerHTML = paginate(projects, page).map(p => `
      <div class="card">
        <h3>${p.title}</h3>
        <div class="meta">${p.date || ''}</div>
        <p>${p.description}</p>
        <div class="tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-links">
          ${p.github ? `<a href="${p.github}" target="_blank">GitHub ↗</a>` : ''}
          ${p.demo ? `<a href="${p.demo}" target="_blank">Demo ↗</a>` : ''}
        </div>
      </div>`).join('');
    renderPagination(document.getElementById('proj-pagination'), projects.length, page, 'renderProjects');
  };

  renderCerts(1);
  renderProjects(1);
}

init();
</script>
</body>
</html>
