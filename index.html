<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <!-- Bootswatch Simplex via jsDelivr CDN -->
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css">

  <style>
    body { padding-top: 56px; }
    .hero-section {
      background: #f8f9fa;
      border-bottom: 3px solid #d9230f;
      padding: 3.5rem 0 2.5rem;
    }
    .hero-section h1 { font-size: 2.6rem; font-weight: 700; }
    .hero-section .badge-link {
      display: inline-block;
      margin: 0.25rem;
    }
    .section-title {
      border-left: 4px solid #d9230f;
      padding-left: 0.75rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }
    .cert-card, .proj-card {
      height: 100%;
      transition: box-shadow 0.2s;
    }
    .cert-card:hover, .proj-card:hover {
      box-shadow: 0 4px 16px rgba(217,35,15,0.12);
    }
    .tag { font-size: 0.75rem; }
    footer {
      background: #f8f9fa;
      border-top: 1px solid #dee2e6;
      padding: 1.5rem 0;
      margin-top: 3rem;
    }
    .pagination { margin-top: 1.5rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-md navbar-dark bg-danger fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" id="nav-name" href="#">Portfolio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#certifications">Certifications</a></li>
        <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero / About -->
<section class="hero-section" id="about">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-8">
        <p class="text-danger fw-semibold mb-1" id="hero-title"></p>
        <h1 id="hero-name">—</h1>
        <p class="text-muted mt-2 mb-3" id="hero-bio"></p>
        <div id="hero-links"></div>
      </div>
      <div class="col-lg-4 mt-3 mt-lg-0">
        <ul class="list-group list-group-flush" id="hero-contact"></ul>
      </div>
    </div>
  </div>
</section>

<!-- Certifications -->
<section class="container mt-5" id="certifications">
  <h2 class="section-title">Certifications</h2>
  <div class="row g-3" id="cert-container"></div>
  <nav id="cert-pagination"></nav>
</section>

<!-- Projects -->
<section class="container mt-5" id="projects">
  <h2 class="section-title">Data Science Projects</h2>
  <div class="row g-3" id="proj-container"></div>
  <nav id="proj-pagination"></nav>
</section>

<!-- Footer -->
<footer>
  <div class="container text-center text-muted small" id="footer"></div>
</footer>

<!-- Bootstrap JS -->
<script src="assets/vendor/bootstrap.bundle.min.js"></script>

<script>
const PER_PAGE = 6;
let certPage = 1, projPage = 1;
let allCerts = [], allProjects = [];

async function load(file) {
  const r = await fetch(file + '?v=' + Date.now());
  return r.json();
}

function paginate(items, page) {
  return items.slice((page - 1) * PER_PAGE, page * PER_PAGE);
}

function renderPagination(containerId, total, current, fnName) {
  const pages = Math.ceil(total / PER_PAGE);
  const el = document.getElementById(containerId);
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `<ul class="pagination">
    ${Array.from({length: pages}, (_, i) => `
      <li class="page-item ${i+1===current?'active':''}">
        <button class="page-link" onclick="${fnName}(${i+1})">${i+1}</button>
      </li>`).join('')}
  </ul>`;
}

window.renderCerts = function(page) {
  certPage = page;
  document.getElementById('cert-container').innerHTML =
    paginate(allCerts, page).map(c => `
      <div class="col-sm-6 col-lg-4">
        <div class="card cert-card">
          <div class="card-body">
            <h5 class="card-title">${c.title}</h5>
            <p class="card-text text-muted small">${c.issuer} &middot; ${c.date}</p>
            ${c.url ? `<a href="${c.url}" target="_blank" class="btn btn-sm btn-outline-danger">View Certificate &rarr;</a>` : ''}
          </div>
        </div>
      </div>`).join('');
  renderPagination('cert-pagination', allCerts.length, page, 'renderCerts');
};

window.renderProjects = function(page) {
  projPage = page;
  document.getElementById('proj-container').innerHTML =
    paginate(allProjects, page).map(p => `
      <div class="col-sm-6 col-lg-4">
        <div class="card proj-card">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${p.title}</h5>
            <p class="card-text text-muted small">${p.date || ''}</p>
            <p class="card-text flex-grow-1">${p.description}</p>
            <div class="mt-2 mb-3">
              ${(p.tags||[]).map(t=>`<span class="badge bg-secondary tag me-1">${t}</span>`).join('')}
            </div>
            <div class="d-flex gap-2">
              ${p.github ? `<a href="${p.github}" target="_blank" class="btn btn-sm btn-danger">GitHub</a>` : ''}
              ${p.demo  ? `<a href="${p.demo}"   target="_blank" class="btn btn-sm btn-outline-secondary">Demo</a>` : ''}
            </div>
          </div>
        </div>
      </div>`).join('');
  renderPagination('proj-pagination', allProjects.length, page, 'renderProjects');
};

async function init() {
  const [profile, certs, projects] = await Promise.all([
    load('data/profile.json'),
    load('data/certifications.json'),
    load('data/projects.json')
  ]);
  allCerts = certs;
  allProjects = projects;

  document.title = profile.name + ' | Portfolio';
  document.getElementById('nav-name').textContent = profile.name.split(' ')[0];
  document.getElementById('hero-name').textContent = profile.name;
  document.getElementById('hero-title').textContent = profile.title;
  document.getElementById('hero-bio').textContent = profile.bio;
  document.getElementById('footer').textContent =
    `© ${new Date().getFullYear()} ${profile.name} · ${profile.email}`;

  // Action buttons
  const linksEl = document.getElementById('hero-links');
  const btnMap = [
    { key: 'github',   label: 'GitHub',   cls: 'btn-danger' },
    { key: 'linkedin', label: 'LinkedIn', cls: 'btn-outline-danger' },
    { key: 'website',  label: 'Website',  cls: 'btn-outline-secondary' },
  ];
  btnMap.forEach(({key, label, cls}) => {
    if (!profile[key]) return;
    linksEl.innerHTML += `<a href="${profile[key]}" target="_blank" class="btn btn-sm ${cls} me-2 mb-2">${label}</a>`;
  });
  if (profile.email) {
    linksEl.innerHTML += `<a href="mailto:${profile.email}" class="btn btn-sm btn-outline-secondary me-2 mb-2">Email</a>`;
  }

  // Contact sidebar
  const contactEl = document.getElementById('hero-contact');
  if (profile.phone)    contactEl.innerHTML += `<li class="list-group-item px-0"><small class="text-muted">Phone</small><div>${profile.phone}</div></li>`;
  if (profile.location) contactEl.innerHTML += `<li class="list-group-item px-0"><small class="text-muted">Location</small><div>${profile.location}</div></li>`;
  if (profile.email)    contactEl.innerHTML += `<li class="list-group-item px-0"><small class="text-muted">Email</small><div>${profile.email}</div></li>`;

  renderCerts(1);
  renderProjects(1);
}

init();
</script>
</body>
</html>
