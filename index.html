<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css">
  <style>
    :root {
      --bg:             #f5f5f7;
      --surface:        #ffffff;
      --surface-2:      #f5f5f7;
      --border:         #d2d2d7;
      --accent:         #0071e3;
      --accent-hover:   #0077ed;
      --text-primary:   #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary:  #aeaeb2;
      --nav-bg:         rgba(255,255,255,0.85);
      --nav-border:     rgba(0,0,0,0.08);
      --radius:         12px;
      --shadow-card:    0 2px 12px rgba(0,0,0,0.07);
      --shadow-hover:   0 8px 28px rgba(0,0,0,0.12);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      padding-top: 52px;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--nav-bg) !important;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--nav-border) !important;
      box-shadow: none !important;
    }
    .navbar-brand {
      color: var(--text-primary) !important;
      font-weight: 600; font-size: 1.15rem;
      letter-spacing: -0.02em; cursor: pointer;
    }
    .navbar-nav .nav-link {
      color: var(--text-secondary) !important;
      font-size: 0.88rem; font-weight: 400;
      padding: 0.3rem 0.5rem !important;
      transition: color 0.2s;
    }
    .navbar-nav .nav-link:hover { color: var(--text-primary) !important; }
    .nav-divider { color: var(--border); padding: 0 0.15rem; font-size: 0.8rem; }

    .navbar-toggler,
    .navbar-toggler:focus,
    .navbar-toggler:active,
    .navbar-toggler:hover { border: none !important; box-shadow: none !important; outline: none !important; }

    /* ── Dropdown panels ── */
    .dropdown-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
      pointer-events: none;
    }
    .dropdown-panel.open { max-height: 400px; opacity: 1; pointer-events: auto; }

    /* Panel layout */
    .panel-inner { display: flex; align-items: stretch; max-height: 320px; }
    .panel-stat-col {
      min-width: 160px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1.25rem; border-right: 1px solid var(--border);
      background: var(--surface-2);
    }
    .panel-stat-col .big-num {
      font-size: 3.5rem; font-weight: 700; color: var(--accent);
      line-height: 1; letter-spacing: -0.03em;
    }
    .panel-stat-col .big-label {
      font-size: 0.78rem; color: var(--text-secondary);
      margin-top: 0.3rem; text-align: center; font-weight: 500;
    }
    .panel-list-col { flex: 1; overflow-y: auto; max-height: 320px; padding: 0.4rem 0; }
    .panel-list-col::-webkit-scrollbar { width: 4px; }
    .panel-list-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .panel-list-item {
      display: flex; align-items: center; padding: 0.48rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid var(--surface-2); transition: background 0.12s;
      color: var(--text-primary);
    }
    .panel-list-item:hover { background: #f0f7ff; color: var(--accent); }
    .panel-list-item .item-num  { font-size: 0.7rem; color: var(--text-tertiary); min-width: 26px; font-weight: 500; }
    .panel-list-item .item-emoji { font-size: 1rem; margin-right: 0.55rem; }
    .panel-list-item .item-title { font-size: 0.84rem; font-weight: 400; }
    .panel-list-item .item-meta  { font-size: 0.73rem; color: var(--text-tertiary); margin-left: auto; padding-left: 0.5rem; white-space: nowrap; }
    .panel-list-item .arrow      { font-size: 0.75rem; color: var(--text-tertiary); margin-left: 0.5rem; }
    .panel-list-item:hover .arrow { color: var(--accent); }

    .about-inner { padding: 1.5rem 0; }
    .about-inner h4 { font-weight: 600; letter-spacing: -0.02em; }
    .about-inner p  { color: var(--text-secondary); }

    /* ── Main layout ── */
    .main-layout { display: flex; gap: 1.25rem; align-items: flex-start; justify-content: center; padding: 1.5rem 0 2rem; }

    /* ── Category sidebar ── */
    .cat-sidebar {
      width: 195px; min-width: 195px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky; top: 70px;
      box-shadow: var(--shadow-card);
      align-self: flex-start;
      margin: 0 auto;
    }
    .cat-sidebar-title {
      background: var(--surface-2);
      color: var(--text-secondary);
      font-size: 0.72rem; font-weight: 600;
      padding: 0.65rem 1rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .cat-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; cursor: pointer;
      border-bottom: 1px solid var(--surface-2);
      transition: background 0.15s, color 0.15s;
      font-size: 0.84rem; color: var(--text-primary);
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-item:hover { background: #f0f7ff; color: var(--accent); }
    .cat-item.active { background: var(--accent); color: #fff; font-weight: 500; }
    .cat-item.active .cat-count { background: rgba(255,255,255,0.22); color: #fff; }
    .cat-item .cat-name { flex: 1; }
    .cat-count {
      background: var(--surface-2); color: var(--text-secondary);
      font-size: 0.7rem; font-weight: 600;
      padding: 0.1rem 0.45rem; border-radius: 20px;
      min-width: 22px; text-align: center;
    }

    /* ── Grid area ── */
    .grid-area { flex: 1; min-width: 0; }
    .section-bar {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1.25rem;
    }
    .section-bar .section-title {
      font-size: 1.1rem; font-weight: 600; color: var(--text-primary);
      margin: 0; letter-spacing: -0.02em;
    }
    .section-bar .counter { font-size: 0.8rem; font-weight: 500; color: var(--text-tertiary); }

    /* ── Project card ── */
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; height: 100%;
      box-shadow: var(--shadow-card);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .proj-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .proj-card.highlight { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
    .proj-card .thumb { width: 100%; height: 155px; object-fit: cover; display: block; }
    .proj-card .thumb-placeholder {
      width: 100%; height: 155px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
    }
    .proj-card .card-body { padding: 0.75rem 0.9rem 1rem; text-align: center; }
    .proj-card .card-title {
      font-weight: 600; font-size: 0.88rem; margin-bottom: 0.6rem;
      color: var(--text-primary); letter-spacing: -0.01em; line-height: 1.3;
    }

    /* Apple-style pill buttons */
    .btn-apple {
      display: inline-block; font-size: 0.78rem; font-weight: 500;
      padding: 0.3rem 0.9rem; border-radius: 20px; margin: 0.15rem;
      text-decoration: none; cursor: pointer; transition: all 0.18s;
      border: 1.5px solid var(--accent); color: var(--accent);
      background: transparent;
    }
    .btn-apple:hover { background: var(--accent); color: #fff !important; }
    .btn-apple.filled { background: var(--accent); color: #fff !important; border-color: var(--accent); }
    .btn-apple.filled:hover { background: var(--accent-hover); }

    /* ── Footer ── */
    .footer-icons {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.9rem 1rem; margin-top: 1rem;
    }
    .footer-nav-row {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 480px; margin: 0 auto;
    }
    .footer-social { display: flex; align-items: center; gap: 0.6rem; }
    .footer-icons a { display: inline-block; color: var(--text-secondary); transition: color 0.2s; }
    .footer-icons a:hover { color: var(--accent); }
    .footer-icons svg { width: 26px; height: 26px; vertical-align: middle; }
    .nav-arrow {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      padding: 0.3rem 1rem; font-size: 0.8rem; color: var(--text-secondary);
      cursor: pointer; transition: all 0.18s; font-family: var(--font);
    }
    .nav-arrow:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-arrow:disabled { opacity: 0.25; cursor: default; }
    .footer-contact {
      background: var(--surface-2); border-top: 1px solid var(--border);
      padding: 0.55rem 0; text-align: center;
      font-size: 0.8rem; color: var(--text-secondary);
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .main-layout { flex-direction: column; }
      .cat-sidebar { width: 100%; min-width: 0; position: static; display: flex; flex-wrap: wrap; }
      .cat-sidebar-title { width: 100%; }
      .cat-item { flex: 1; min-width: 110px; border-right: 1px solid var(--surface-2); border-bottom: none; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-md fixed-top">

  <div class="container p-0">

      <div class="panel-stat-col">
        <div class="big-num" id="total-cert-num">—</div>
        <div class="big-label">Total<br>Certifications</div>

<script src="assets/vendor/bootstrap.bundle.min.js"></script>
<script>
  const PER_PAGE = 9;
  let currentPage = 1, allProjects = [], allCerts = [], filteredProjs = [], activeCategory = 'All';

  /* ════════════════════════════════════════════════
     OPTION 1 — Auto emoji from project title
     Rules ordered most-specific → least-specific.
     Manual "emoji" in projects.json always overrides.
  ════════════════════════════════════════════════ */
  function autoEmoji(title) {
    const t = title.toLowerCase();
    const rules = [
      /* ── Specific multi-word phrases first ── */
      [['medical image','chest x','brain scan','mri','ct scan'],              '🩻'],
      [['drug discovery','molecule','pharma'],                                 '💊'],
      [['fake news','misinformation','fact check'],                            '📰'],
      [['supply chain','logistics','warehouse'],                               '🚚'],
      [['customer churn','customer segment','customer lifetime'],              '👥'],
      [['credit risk','loan default','fraud detect'],                          '🔍'],
      [['stock market','stock price','market forecast','crypto','trading'],    '📈'],
      [['time series','demand forecast','retail forecast','sales forecast'],   '⏱️'],
      [['object detect','image classif','yolo','face recogn','road sign'],    '👁️'],
      [['autonomous','self-driv','car simulat'],                               '🚗'],
      [['crop yield','agriculture','farm','food supply'],                      '🌾'],
      [['wildfire','earthquake','flood','disaster','climate'],                 '🌍'],
      [['air quality','pollution','emission','environment'],                   '🌫️'],
      [['energy','power grid','electricity','solar'],                          '⚡'],
      [['sport','football','cricket','basketball','soccer','athlete'],         '⚽'],
      [['social network','graph neural','community detect'],                   '🕸️'],
      [['resume','job','recruit','hr','hiring'],                               '📄'],
      [['recommendation','suggest','personaliz','collaborative filter'],       '🎯'],
      [['chatbot','conversational','dialogue','virtual assistant'],            '💬'],
      [['sentiment','emotion','opinion','review','text classif'],              '🧠'],
      [['speech','voice','audio','sound','music'],                             '🎙️'],
      [['handwrit','ocr','document recogn','signature'],                       '✍️'],
      [['traffic','transport','commute','urban mobil'],                        '🚦'],
      [['space','cosmos','galaxy','star','astro','planet','nasa','satellite'], '🌌'],
      [['cybersecur','intrusion','malware','threat','anomaly detect'],         '🔐'],
      [['robot','manufactur','industri automat'],                              '🤖'],
      /* ── Broader single-word catches below ── */
      [['health','hospital','disease','cancer','diabetes','clinical','patient'],'🏥'],
      [['bank','financ','invest','loan','insurance','revenue','profit'],       '💰'],
      [['nlp','language model','transformer','bert','gpt','llm'],             '📝'],
      [['deep learn','neural network','cnn','rnn','lstm'],                    '🔬'],
      [['machine learn','predict','classif','regression','cluster','svm'],    '⚙️'],
      [['data analys','data visual','dashboard','tableau','powerbi','eda'],   '📊'],
      [['image','photo','vision','pixel','camera'],                            '🖼️'],
      [['web','app','api','website','portfolio','frontend','backend'],         '💻'],
      [['map','geo','location','gis','spatial'],                               '🗺️'],
      [['network','graph'],                                                    '🕸️'],
    ];
    for (const [keywords, emoji] of rules) {
      if (keywords.some(k => t.includes(k))) return emoji;
    }
    return '📁'; // default fallback
  }

  /* ════════════════════════════════════════════════
     OPTION 3 — Category-based gradient colours
     Add your own category name + gradient here.
  ════════════════════════════════════════════════ */
const CAT_GRADIENTS = {
    'Machine Learning':  'linear-gradient(135deg,#e8f0fe,#c5cae9)',
    'NLP':               'linear-gradient(135deg,#dde8f7,#b8ccee)',
    'Computer Vision':   'linear-gradient(135deg,#e3eaf5,#bdd0ee)',
    'Finance':           'linear-gradient(135deg,#e8edf5,#c2d0e8)',
    'Healthcare':        'linear-gradient(135deg,#dde8f5,#b8ceea)',
    'Data Analysis':     'linear-gradient(135deg,#e4ecf7,#c0d2ec)',
    'Web':               'linear-gradient(135deg,#e8edf7,#c5d2ea)',
    'Deep Learning':     'linear-gradient(135deg,#dce5f5,#b5c8e8)',
    'Robotics':          'linear-gradient(135deg,#e0e8f5,#bccde8)',
    'Cybersecurity':     'linear-gradient(135deg,#e2ebf7,#bdd0ec)',
};
  function catGradient(category) {
    return CAT_GRADIENTS[category] || 'linear-gradient(135deg,#e8edf5,#c5d2ea)';
  }

  /* ════════════════════════════════════════════════
     Core functions
  ════════════════════════════════════════════════ */
  function togglePanel(e, id) {
    e.preventDefault();
    ['about-panel','proj-panel','cert-panel'].forEach(p =>
      document.getElementById(p).classList[p === id ? 'toggle' : 'remove']('open'));
  }
  function closePanels() {
    ['about-panel','proj-panel','cert-panel'].forEach(p =>
      document.getElementById(p).classList.remove('open'));
  }

  function selectCategory(cat) {
    activeCategory = cat;
    filteredProjs  = cat === 'All'
      ? allProjects
      : allProjects.filter(p => (p.category || 'Uncategorised') === cat);
    document.querySelectorAll('.cat-item').forEach(el =>
      el.classList.toggle('active', el.dataset.cat === cat));
    document.getElementById('grid-title').textContent = cat === 'All' ? 'Projects' : cat;
    renderProjects(1);
  }

  function buildCategorySidebar() {
    const counts = {};
    allProjects.forEach(p => {
      const c = p.category || 'Uncategorised';
      counts[c] = (counts[c] || 0) + 1;
    });
    const cats = Object.keys(counts).sort();
    document.getElementById('cat-list').innerHTML =
      `<div class="cat-item active" data-cat="All" onclick="selectCategory('All')">
         <span class="cat-name">All</span>
         <span class="cat-count">${allProjects.length}</span>
       </div>` +
      cats.map(cat =>
        `<div class="cat-item" data-cat="${cat}" onclick="selectCategory('${cat}')">
           <span class="cat-name">${cat}</span>
           <span class="cat-count">${counts[cat]}</span>
         </div>`).join('');
  }

  function renderProjects(page) {
    currentPage = page;
    const total      = filteredProjs.length;
    const totalPages = Math.ceil(total / PER_PAGE) || 1;
    const start      = (page - 1) * PER_PAGE;
    const end        = Math.min(start + PER_PAGE, total);

    document.getElementById('proj-counter').textContent =
      total === 0 ? '0 projects' : end + ' / ' + total;

    document.getElementById('proj-container').innerHTML = total === 0
      ? `<div class="col-12"><p style="color:var(--text-tertiary);font-size:0.88rem;margin-top:0.5rem">No projects in this category yet.</p></div>`
      : filteredProjs.slice(start, end).map((p, i) => {
          /* Option 1: use manual emoji if set, else auto-detect from title */
          const emoji = p.emoji || autoEmoji(p.title);
          /* Option 3: gradient from category */
          const grad  = catGradient(p.category);
          return `
            <div class="col-6 col-md-4">
              <div class="proj-card" id="proj-card-${start + i}">
                ${p.image
                  ? `<img src="${p.image}" class="thumb" alt="${p.title}">`
                  : `<div class="thumb-placeholder" style="background:${grad}">${emoji}</div>`}
                <div class="card-body">
                  <div class="card-title">${p.title}</div>
                  <a href="${p.readme || '#'}" target="_blank" class="btn-apple">ReadMe</a>
                  <a href="${p.github || '#'}" target="_blank" class="btn-apple filled">Source Code</a>
                </div>
              </div>
            </div>`;
        }).join('');

    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= totalPages;
  }

  function changePage(dir) {
    const newPage    = currentPage + dir;
    const totalPages = Math.ceil(filteredProjs.length / PER_PAGE) || 1;
    if (newPage >= 1 && newPage <= totalPages) renderProjects(newPage);
  }

  function goToProject(globalIndex) {
    closePanels();
    selectCategory('All');
    const page = Math.ceil((globalIndex + 1) / PER_PAGE);
    renderProjects(page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(() => {
      const pos   = globalIndex % PER_PAGE;
      const cards = document.querySelectorAll('#proj-container .proj-card');
      if (cards[pos]) {
        cards[pos].classList.add('highlight');
        cards[pos].scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => cards[pos].classList.remove('highlight'), 2000);
      }
    }, 150);
  }

  function buildProjList() {
    document.getElementById('total-proj-num').textContent = allProjects.length;
    document.getElementById('proj-list').innerHTML =
      allProjects.map((p, i) => {
        const emoji = p.emoji || autoEmoji(p.title);
        return `
          <div class="panel-list-item" onclick="goToProject(${i})">
            <span class="item-num">${i + 1}.</span>
            <span class="item-emoji">${emoji}</span>
            <span class="item-title">${p.title}</span>
            <span class="arrow">›</span>
          </div>`;
      }).join('');
  }

  function buildCertList() {
    document.getElementById('total-cert-num').textContent = allCerts.length;
    document.getElementById('cert-list').innerHTML =
      allCerts.map((c, i) =>
        `<div class="panel-list-item" ${c.url ? `onclick="window.open('${c.url}','_blank')"` : ''}>
           <span class="item-num">${i + 1}.</span>
           <span class="item-emoji">🏅</span>
           <span class="item-title">${c.title}</span>
           <span class="item-meta">${c.date}</span>
           <span class="arrow">↗</span>
         </div>`).join('');
  }

  async function init() {
    const ts = '?v=' + Date.now();
    const [profile, certs, projects] = await Promise.all([
      fetch('data/profile.json'        + ts).then(r => r.json()),
      fetch('data/certifications.json' + ts).then(r => r.json()),
      fetch('data/projects.json'       + ts).then(r => r.json()),
    ]);

    allProjects   = projects;
    allCerts      = certs;
    filteredProjs = projects;

    document.title = 'Portfolio';
    if (profile.cv) document.getElementById('cv-link').href = profile.cv;

    document.getElementById('about-name').textContent  = profile.name;
    document.getElementById('about-title').textContent = profile.title || '';
    document.getElementById('about-bio').textContent   = profile.bio   || '';
    if (profile.location) document.getElementById('about-location').textContent = '📍 ' + profile.location;
    if (profile.phone)    document.getElementById('about-phone').textContent    = '📞 ' + profile.phone;
    if (profile.email)    document.getElementById('about-email').textContent    = '✉️ '  + profile.email;
    if (profile.website)  document.getElementById('about-website').innerHTML    =
      '🌐 <a href="' + profile.website + '" target="_blank" style="color:var(--accent)">' + profile.website + '</a>';

    if (profile.github)   document.getElementById('github-link').href   = profile.github;
    if (profile.linkedin) document.getElementById('linkedin-link').href = profile.linkedin;
    const parts = [];
    if (profile.phone) parts.push('Phone: ' + profile.phone);
    if (profile.email) parts.push('Email: <strong style="color:var(--text-primary)">' + profile.email + '</strong>');
    document.getElementById('footer-contact').innerHTML = parts.join(' &nbsp;|&nbsp; ');

    buildCategorySidebar();
    buildProjList();
    buildCertList();
    renderProjects(1);
  }

  init();
</script>
</body>
</html>
